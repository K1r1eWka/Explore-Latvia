
# version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: app_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    image: ruby:3.2
    working_dir: /app
    volumes: 
      - ./backend:/app
    ports:
       - "3001:3000"
    depends_on:
       - db
    command: bash -c "bundle install && rails server -b 0.0.0.0"

volumes:
  postgres_data: